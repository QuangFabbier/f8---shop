<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .box-orange{
        position: relative;
        background-color: orange;
        width: 400px;
        height: 400px;
        margin-top: 100px ;
        margin-left: 200px;
    }
    .box-blue{
        position: absolute;
        background-color: blue;
        top: 50px;
        left: 500px;
        width: 100px;
        height: 100px;
    }
</style>

<body>
    <div class="box-orange">
        <div class="box-blue"></div>
    </div>
   
</body>
</html>
